name: "Premium Science Blog Auto-Publisher"

on:
  # 구글 스프레드시트 Apps Script에서 HTTP API로 원격 호출 (자동 예약 + 수동 즉시 발행)
  repository_dispatch:
    types: [publish-blog]
  
  # 수동 트리거 지원 (GitHub UI에서 직접 실행도 가능)
  workflow_dispatch:

# GITHUB_TOKEN 권한 명시 (이미지 전용 orphan 브랜치에 쓰기 작업을 수행하기 위해 필수)
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout Main Branch"
        uses: actions/checkout@v4
        with:
          # 소스 코드 가져오기 최적화 (기본 clone)
          persist-credentials: false
          
      - name: "Setup Python Environment"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
          
      - name: "Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          
      - name: "Execute Science Blog Automation Pipeline"
        env:
          # Gemini API Credentials
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # Pixabay API Credentials (Optional)
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          
          # Google Sheets API & DB Settings
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          
          # Blogger API Settings
          BLOG_ID: ${{ secrets.BLOG_ID }}
          
          # Google OAuth2 Credentials for Sheets/Blogger
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          
          # Git Settings (GitHub Actions default workspace mapping)
          GITHUB_REPOSITORY: ${{ github.repository }}
          # GITHUB_TOKEN에 쓰기 권한이 부여되어 있으므로 인증 툴로 안전하게 매핑
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # 이미지 저장 전용 브랜치 이름 명시
          IMAGE_BRANCH: "images-hosting"
        run: |
          # 파이썬 실행 진입점 가동
          python src/main.py
