name: "Premium Science Blog Auto-Publisher"

on:
  schedule:
    # 하루 4회, 6시간 간격 자동 크론 실행 (UTC 00:00, 06:00, 12:00, 18:00)
    - cron: '0 */6 * * *'
  
  # 수동 트리거 지원 (테스트 및 즉시 발행용)
  workflow_dispatch:

# GITHUB_TOKEN 권한 명시 (이미지 전용 orphan 브랜치에 쓰기 작업을 수행하기 위해 필수)
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout Main Branch"
        uses: actions/checkout@v4
        with:
          # 소스 코드 가져오기 최적화 (기본 clone)
          persist-credentials: false
          
      - name: "Setup Python Environment"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # 의존성 설치 속도 가속화
          
      - name: "Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: "Execute Science Blog Automation Pipeline"
        env:
          # Gemini API Credentials
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # Google Sheets API & DB Settings
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          
          # Blogger API Settings
          BLOG_ID: ${{ secrets.BLOG_ID }}
          
          # Google OAuth2 Credentials for Sheets/Blogger
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          
          # Git Settings (GitHub Actions default workspace mapping)
          GITHUB_REPOSITORY: ${{ github.repository }}
          # GITHUB_TOKEN에 쓰기 권한이 부여되어 있으므로 인증 툴로 안전하게 매핑
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # 이미지 저장 전용 브랜치 이름 명시
          IMAGE_BRANCH: "images-hosting"
        run: |
          # 파이썬 실행 진입점 가동
          python src/main.py
